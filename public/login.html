<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - النظام الذكي</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; }
        .login-box { border: 1px solid #ccc; padding: 20px; width: 300px; margin: auto; border-radius: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>تسجيل الدخول للمطعم</h2>
        
        <input type="text" id="username-input" placeholder="اسم المستخدم (مثلاً: nasser)">
        <input type="password" id="password-input" placeholder="كلمة المرور">
        
        <button id="login-btn">دخول</button>
    </div>

    <script type="module" src="login.js"></script>

</body>
</html>
